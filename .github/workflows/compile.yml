name: Compilar Tweak iOS

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout do código
      uses: actions/checkout@v4

    - name: Configurar o ambiente Theos
      run: |
        bash -c "$(curl -fsSL https://raw.githubusercontent.com/theos/theos/master/bin/install-theos)"
        echo "THEOS=/home/runner/theos" >> $GITHUB_ENV

    - name: Configurar SDK do iOS
      run: |
        rm -rf /home/runner/theos/sdks
        git clone --depth=1 https://github.com/theos/sdks.git /home/runner/theos/sdks
        
    - name: Compilar o Projeto
      run: |
        export THEOS=/home/runner/theos
        make package FINALPACKAGE=1

    - name: Capturar arquivos compilados
      run: |
        mkdir -p output
        # Copia qualquer dylib ou deb gerado no projeto para a pasta de download
        find .theos/obj/ -type f \( -name "*.dylib" -o -name "*.deb" \) -exec cp {} output/ \; || true
        find . -maxdepth 2 -type f \( -name "*.dylib" -o -name "*.deb" \) -exec cp {} output/ \; || true
        ls -la output/

    - name: Disponibilizar arquivo para Baixar
      uses: actions/upload-artifact@v4
      with:
        name: FlorkMacro-Compilado
        path: output/
        if-no-files-found: error
